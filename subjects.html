<nav class="navbar" id="navbar" aria-label="Site navigation"></nav>

<main class="page-main">

  <section class="subjects-page">

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

      <div class="subjects-page-head">
        <div>
          <div class="subjects-kicker" id="subjects-kicker">Subjects</div>

      </div>

      <!-- Standard stream -->

        <div class="subjects-page-grid" id="subject-grid"></div>

        <div id="no-subjects" class="empty-state" style="display:none">
          <div class="empty-icon">📚</div>
          <p id="no-subjects-text">No subjects found for this filter.</p>
        </div>
      </div>

     <!-- Electrical stream -->
<div id="electrical-sections" style="display:none">

    <div class="subject-group-head">

          Grade 10 technical subjects only. Common SEE subjects are available in English Medium.
