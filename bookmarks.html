<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bookmarks — see2083</title>
  <meta name="description" content="View saved SEE Grade 10 chapters and MCQ questions on see2083." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/premium.css" />
</head>

<body>

<nav class="navbar" id="navbar" aria-label="Site navigation"></nav>

<main class="page-main">

  <section class="bookmarks-page">
    <div class="container">

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

      <div class="bookmarks-page-head">
        <div>
          <div class="bookmarks-kicker" id="bookmarks-kicker">Saved items</div>
          <h1 id="page-title">Bookmarks</h1>
          <p id="page-sub">Your saved chapters and questions.</p>
        </div>

        <a href="medium.html" class="btn btn-outline btn-sm" id="start-link">
          Start Learning
        </a>
      </div>

      <div class="bookmarks-panel">

        <div class="bookmarks-toolbar">
          <div class="tabs bookmarks-tabs" id="filter-tabs" role="group" aria-label="Bookmark filter">
            <button class="tab-btn active" data-filter="all" id="tab-all">All</button>
            <button class="tab-btn" data-filter="chapter" id="tab-chapters">Chapters</button>
            <button class="tab-btn" data-filter="mcq" id="tab-mcqs">MCQ Questions</button>
          </div>

          <div class="bookmarks-count" id="bookmarks-count"></div>
        </div>

        <div id="bookmark-list" class="bookmark-list"></div>

        <div id="empty-state" class="empty-state bookmarks-empty-state" style="display:none">
          <div class="empty-icon">🔖</div>
          <h3 id="empty-title">Nothing saved yet</h3>
          <p id="empty-sub">Start Learning and keep saved chapters or questions for easy access.</p>
          <a href="medium.html" class="btn btn-primary" id="empty-start-btn">Start Learning</a>
        </div>

      </div>

    </div>
  </section>

</main>

<footer class="footer" id="footer"></footer>
<nav class="bottom-nav" id="bottom-nav" aria-label="Mobile navigation"></nav>

<script src="js/data.js"></script>
<script src="js/data-official-patch.js"></script>
<script src="js/theme.js"></script>
<script src="js/language.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/main.js"></script>
<script src="js/utils.js"></script>
<script src="js/bookmarks-page.js"></script>

</body>
</html>
