<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chapters — see2083</title>
  <meta name="description" content="View SEE Grade 10 chapters by subject and start studying notes, MCQs, mock tests, and past questions." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/premium.css" />
</head>

<body>

<nav class="navbar" id="navbar" aria-label="Site navigation"></nav>

<main class="page-main">

  <section class="chapters-page">
    <div class="container">

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

      <div class="chapters-page-head">
        <div class="chapters-subject-icon" id="subject-icon" aria-hidden="true">📚</div>

        <div class="chapters-head-content">
          <div class="chapters-kicker" id="chapters-kicker">Subject chapters</div>

          <h1 id="subject-title">Chapters</h1>

          <p id="subject-desc">
            Choose a chapter to view study options, notes, MCQs, and practice sections.
          </p>

          <div class="chapters-meta-row" id="chapters-meta-row"></div>
        </div>

        <div class="chapters-head-actions">
          <a href="subjects.html" class="btn btn-outline btn-sm" id="back-subjects-btn">
            ← Subjects
          </a>
        </div>
      </div>

      <div class="chapters-toolbar">
        <div>
          <h2 id="chapter-list-title">Chapter list</h2>
          <p id="chapter-list-subtitle">Open a chapter to start studying.</p>
        </div>

        <div class="chapters-count" id="chapters-count"></div>
      </div>

      <div id="chapters-grid" class="chapters-page-grid"></div>

      <div id="no-chapters" class="empty-state" style="display:none">
        <div class="empty-icon">📚</div>
        <h3 id="no-chapters-title">Chapters are being prepared</h3>
        <p id="no-ch-text">Chapters for this subject are being prepared. Check back soon.</p>
        <a href="subjects.html" class="btn btn-primary" id="no-chapters-btn">Back to subjects</a>
      </div>

    </div>
  </section>

</main>

<footer class="footer" id="footer"></footer>
<nav class="bottom-nav" id="bottom-nav" aria-label="Mobile navigation"></nav>

<script src="js/data.js"></script>

<script src="js/chapters.js"></script>

</body>
</html>
